services:
  # ---- ZooKeeper ----
  zookeeper:
    image: zookeeper:3.9.2
    restart: "no"
    tmpfs:
      - /data
      - /datalog
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ---- Fluss Coordinator ----
  coordinator-server:
    image: apache/fluss:0.9.0-incubating
    command: coordinatorServer
    restart: "no"
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/9123"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s
    environment:
      FLUSS_PROPERTIES: |
        zookeeper.address: zookeeper:2181
        bind.listeners: FLUSS://coordinator-server:0,CLIENT://coordinator-server:9123
        advertised.listeners: FLUSS://coordinator-server:9333,CLIENT://coordinator-server:9123
    ports:
      - "9123:9123"

  # ---- Fluss Tablet Server ----
  tablet-server:
    image: apache/fluss:0.9.0-incubating
    command: tabletServer
    restart: "no"
    depends_on:
      coordinator-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/9123"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s
    environment:
      FLUSS_PROPERTIES: |
        zookeeper.address: zookeeper:2181
        tablet-server.id: 0
        bind.listeners: FLUSS://tablet-server:9333,CLIENT://tablet-server:9123
        advertised.listeners: FLUSS://tablet-server:9333,CLIENT://tablet-server:9123
        kv.snapshot.interval: 0s
    ports:
      - "9124:9123"

  # ---- Fluss Gateway (REST API) ----
  fluss-gateway:
    image: fluss-gateway:latest
    # Wait for coordinator to be fully ready, then delay before connecting
    entrypoint: ["sh", "-c", "sleep 5 && exec fluss-gateway serve --fluss-coordinator=coordinator-server:9123 --host=0.0.0.0 --port=8080 --log-level=info"]
    depends_on:
      coordinator-server:
        condition: service_healthy
      tablet-server:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  fluss-data:
    driver: local
    driver_opts:
      type: "tmpfs"
      device: "tmpfs"
