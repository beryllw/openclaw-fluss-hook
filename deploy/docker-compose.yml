# Standalone Fluss + Flink Cluster
# For use with external OpenClaw instances connecting over the network.
#
# Usage:
#   1. Copy .env.example to .env and set HOST_IP to your server's IP
#   2. Run: ./scripts/setup.sh
#   3. Run: docker compose up -d
#
# OpenClaw fluss-hook plugin should set:
#   fluss.bootstrapServers = "<HOST_IP>:9123"

services:
  # ---- ZooKeeper ----
  zookeeper:
    image: zookeeper:3.9.2
    network_mode: host
    restart: always
    environment:
      ZOO_MY_ID: 1

  # ---- Fluss Coordinator Server ----
  # Port: 9123 (client connections)
  coordinator-server:
    image: apache/fluss:0.9.0-incubating-rc2
    network_mode: host
    command: coordinatorServer
    depends_on:
      - zookeeper
    restart: always
    environment:
      - |
        FLUSS_PROPERTIES=
        zookeeper.address: localhost:2181
        bind.listeners: FLUSS://${HOST_IP:-0.0.0.0}:9123
        remote.data.dir: /tmp/fluss/remote-data
    volumes:
      - fluss-data:/tmp/fluss

  # ---- Fluss Tablet Server ----
  # Port: 9124 (data read/write, different from coordinator to avoid conflict on host network)
  tablet-server:
    image: apache/fluss:0.9.0-incubating-rc2
    network_mode: host
    command: tabletServer
    depends_on:
      - coordinator-server
    restart: always
    environment:
      - |
        FLUSS_PROPERTIES=
        zookeeper.address: localhost:2181
        bind.listeners: FLUSS://${HOST_IP:-0.0.0.0}:9124
        data.dir: /tmp/fluss/data
        remote.data.dir: /tmp/fluss/remote-data
    volumes:
      - fluss-data:/tmp/fluss

  # ---- Flink JobManager ----
  # Port: 8081 (Web UI), 6123 (RPC)
  jobmanager:
    image: flink:1.20-scala_2.12-java17
    network_mode: host
    restart: always
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "cp /tmp/jars/*.jar /opt/flink/lib/ 2>/dev/null || true;
       /docker-entrypoint.sh jobmanager"
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: localhost
        rest.port: 8081
        rest.bind-address: 0.0.0.0
    volumes:
      - ./flink-lib:/tmp/jars

  # ---- Flink TaskManager ----
  taskmanager:
    image: flink:1.20-scala_2.12-java17
    network_mode: host
    depends_on:
      - jobmanager
    restart: always
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "cp /tmp/jars/*.jar /opt/flink/lib/ 2>/dev/null || true;
       /docker-entrypoint.sh taskmanager"
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: localhost
        taskmanager.numberOfTaskSlots: 10
        taskmanager.memory.process.size: 2048m
    volumes:
      - ./flink-lib:/tmp/jars

volumes:
  fluss-data:
    driver: local
