services:
  # ---- Fluss Cluster ----
  zookeeper:
    image: zookeeper:3.9.2
    restart: "no"
    tmpfs:
      - /data
      - /datalog
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  coordinator-server:
    image: apache/fluss:0.9.0-incubating-rc2
    command: coordinatorServer
    restart: "no"
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/9123"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s
    environment:
      - |
        FLUSS_PROPERTIES=
        zookeeper.address: zookeeper:2181
        bind.listeners: FLUSS://coordinator-server:0,CLIENT://coordinator-server:9123
        advertised.listeners: FLUSS://coordinator-server:9333,CLIENT://coordinator-server:9123
        remote.data.dir: /tmp/fluss/remote-data
    volumes:
      - fluss-data:/tmp/fluss

  tablet-server:
    image: apache/fluss:0.9.0-incubating-rc2
    command: tabletServer
    restart: "no"
    depends_on:
      coordinator-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/9123"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s
    environment:
      - |
        FLUSS_PROPERTIES=
        zookeeper.address: zookeeper:2181
        tablet-server.id: 0
        bind.listeners: FLUSS://tablet-server:9333,CLIENT://tablet-server:9123
        advertised.listeners: FLUSS://tablet-server:9333,CLIENT://tablet-server:9123
        data.dir: /tmp/fluss/data
        remote.data.dir: /tmp/fluss/remote-data
        kv.snapshot.interval: 0s
    volumes:
      - fluss-data:/tmp/fluss

  # ---- Fluss Gateway (REST API) ----
  fluss-gateway:
    image: fluss-gateway:latest
    entrypoint: ["sh", "-c", "sleep 5 && exec fluss-gateway serve --fluss-coordinator=coordinator-server:9123 --host=0.0.0.0 --port=8080 --log-level=info"]
    depends_on:
      coordinator-server:
        condition: service_healthy
      tablet-server:
        condition: service_healthy
    ports:
      - "8080:8080"

  # ---- Flink Cluster ----
  jobmanager:
    image: flink:1.20-scala_2.12-java17
    ports:
      - "8083:8081"
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "cp /tmp/jars/*.jar /opt/flink/lib/ 2>/dev/null || true;
       /docker-entrypoint.sh jobmanager"
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
    volumes:
      - ./flink-lib:/tmp/jars

  taskmanager:
    image: flink:1.20-scala_2.12-java17
    depends_on:
      - jobmanager
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "cp /tmp/jars/*.jar /opt/flink/lib/ 2>/dev/null || true;
       /docker-entrypoint.sh taskmanager"
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 10
        taskmanager.memory.process.size: 2048m
    volumes:
      - ./flink-lib:/tmp/jars

  # ---- OpenClaw Gateway + fluss-hook plugin ----
  openclaw:
    image: demo-openclaw
    ports:
      - "18789:18789"
    depends_on:
      fluss-gateway:
        condition: service_started
    init: true
    restart: unless-stopped
    environment:
      HOME: /home/node
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      BAILIAN_API_KEY: ${BAILIAN_API_KEY:-}
    volumes:
      - ./config/openclaw.json:/tmp/openclaw-config.json:ro
      - ./scripts/auto-approve.sh:/tmp/auto-approve.sh:ro
    command:
      [
        "sh", "-c",
        "mkdir -p /home/node/.openclaw && cp /tmp/openclaw-config.json /home/node/.openclaw/openclaw.json && sh /tmp/auto-approve.sh & node dist/index.js gateway --allow-unconfigured --auth token --token demo-fluss-hook-2026 --bind lan"
      ]

volumes:
  fluss-data:
    driver: local
    driver_opts:
      type: "tmpfs"
      device: "tmpfs"
